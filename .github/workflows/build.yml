name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: macos-26

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iPhone
            destination: "platform=iOS Simulator,name=iPhone 17"
          - name: iPad
            destination: "platform=iOS Simulator,name=iPad Pro 13-inch (M5)"
          - name: Mac Catalyst
            destination: "platform=macOS,variant=Mac Catalyst"

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1.7.0
        with:
          xcode-version: "26.4"

      - name: Archive for ${{ matrix.name }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Kwik.xcodeproj \
            -scheme Kwik \
            -destination "${{ matrix.destination }}" \
            -archivePath "${{ runner.temp }}/Kwik-${{ matrix.name }}.xcarchive" \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload archive
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Kwik-${{ matrix.name }}.xcarchive
          path: ${{ runner.temp }}/Kwik-${{ matrix.name }}.xcarchive
